version: "3.9"

services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: crtais-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: crtais
      POSTGRES_PASSWORD: crtais_dev_2026
      POSTGRES_DB: crtais
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crtais"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongodb:
    image: mongo:7
    container_name: crtais-mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: crtais
      MONGO_INITDB_ROOT_PASSWORD: crtais_dev_2026
      MONGO_INITDB_DATABASE: crtais
    ports:
      - "27017:27017"
    volumes:
      - mongodata:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
  mongodata:
